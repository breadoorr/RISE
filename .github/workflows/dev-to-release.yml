name: 'Development to Release Pipeline'

on:
  push:
    branches:
      - development

jobs:
  # First job: Run cross-platform compatibility tests
  test-compatibility:
    name: Test Cross-Platform Compatibility
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
          - platform: 'ubuntu-22.04'
            args: ''
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.0-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Debug directory structure
        run: |
          pwd
          ls -la
          
      - name: Install frontend dependencies
        run: |
          # Find and use the package.json location
          if [ -f "package.json" ]; then
            npm install
          elif [ -f "../package.json" ]; then
            cd ..
            npm install
          else
            echo "Searching for package.json..."
            find $(pwd) -name "package.json" -type f | head -n 1
            # Use the found path or fail if not found
            PACKAGE_JSON_PATH=$(find $(pwd) -name "package.json" -type f | head -n 1)
            if [ -n "$PACKAGE_JSON_PATH" ]; then
              cd $(dirname "$PACKAGE_JSON_PATH")
              npm install
            else
              echo "Error: package.json not found"
              exit 1
            fi
          fi

      - name: Install frontend dependencies
        run: npm install

      # Run the cross-platform compatibility tests
      - name: Run cross-platform compatibility tests
        run: |
          cd src-tauri
          cargo test --verbose

  # Second job: Push to release branch if tests pass
  push-to-release:
    name: Push to Release Branch
    needs: test-compatibility
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to release branch
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git checkout -b release
          git push origin release --force

  # Third job: Build and publish after pushing to release
  publish-tauri:
    name: Build and Publish
    needs: push-to-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
          - platform: 'ubuntu-22.04'
            args: ''
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: release

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.0-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: npm install

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: app-v__VERSION__
          releaseName: 'App v__VERSION__'
          releaseBody: 'See the assets to download this version and install.'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
